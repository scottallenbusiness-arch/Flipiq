<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlipIQ — Resale Intelligence</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0d0f12;
    --surface: #161a20;
    --surface2: #1e242d;
    --border: #2a3140;
    --accent: #00e5a0;
    --accent-dim: rgba(0,229,160,0.12);
    --accent-glow: rgba(0,229,160,0.25);
    --warn: #ff6b35;
    --warn-dim: rgba(255,107,53,0.12);
    --text: #e8edf5;
    --muted: #6b7a94;
    --mono: 'Space Mono', monospace;
    --sans: 'Space Grotesk', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    line-height: 1.5;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 18px 28px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    font-family: var(--mono);
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .logo-sub {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 1px;
  }

  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    gap: 4px;
  }

  .tab {
    padding: 12px 18px;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: var(--sans);
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .panel { display: none; padding: 28px; max-width: 900px; }
  .panel.active { display: block; }

  /* TREND PANEL */
  .search-row {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
  }

  input[type="text"], select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: 0.9rem;
    padding: 10px 14px;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="text"]:focus, select:focus {
    border-color: var(--accent);
  }

  input[type="text"] { flex: 1; }

  button {
    background: var(--accent);
    color: #0a0f0c;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-family: var(--sans);
    font-size: 0.88rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }

  button:hover { opacity: 0.88; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    font-weight: 500;
  }

  .trend-result {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px;
    display: none;
  }

  .trend-result.visible { display: block; }

  .trend-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
    gap: 16px;
    flex-wrap: wrap;
  }

  .trend-product-name {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
  }

  .trend-score {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .score-pill {
    font-family: var(--mono);
    font-size: 0.8rem;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
    letter-spacing: 0.05em;
  }

  .score-hot { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent); }
  .score-warm { background: rgba(255,200,50,0.12); color: #ffc832; border: 1px solid #ffc832; }
  .score-cold { background: rgba(107,122,148,0.15); color: var(--muted); border: 1px solid var(--border); }
  .score-risky { background: var(--warn-dim); color: var(--warn); border: 1px solid var(--warn); }

  .trend-body {
    font-size: 0.88rem;
    color: #c2cad8;
    line-height: 1.7;
    margin-bottom: 16px;
  }

  .trend-metrics {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    margin-top: 16px;
  }

  .metric-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
  }

  .metric-label {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 4px;
  }

  .metric-value {
    font-family: var(--mono);
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text);
  }

  .metric-value.green { color: var(--accent); }
  .metric-value.orange { color: var(--warn); }
  .metric-value.yellow { color: #ffc832; }

  .loading {
    display: none;
    align-items: center;
    gap: 12px;
    color: var(--muted);
    font-size: 0.88rem;
    padding: 20px 0;
  }

  .loading.visible { display: flex; }

  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* INVENTORY PANEL */
  .add-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
  }

  .add-form h3 {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 14px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr auto;
    gap: 10px;
    align-items: end;
  }

  .form-group label {
    display: block;
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  input[type="number"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.88rem;
    padding: 10px 12px;
    border-radius: 8px;
    outline: none;
    width: 100%;
    transition: border-color 0.15s;
  }

  input[type="number"]:focus { border-color: var(--accent); }

  /* TABLE */
  .table-wrap {
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }

  thead tr {
    border-bottom: 1px solid var(--border);
  }

  th {
    text-align: left;
    padding: 10px 12px;
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    white-space: nowrap;
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  tbody tr:hover { background: var(--surface2); }

  td {
    padding: 12px 12px;
    vertical-align: middle;
  }

  .td-mono { font-family: var(--mono); font-size: 0.82rem; }
  .profit-pos { color: var(--accent); font-weight: 700; }
  .profit-neg { color: var(--warn); font-weight: 700; }
  .profit-pend { color: var(--muted); }

  .status-badge {
    font-size: 0.7rem;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .status-sold { background: var(--accent-dim); color: var(--accent); }
  .status-listed { background: rgba(255,200,50,0.12); color: #ffc832; }
  .status-held { background: rgba(107,122,148,0.15); color: var(--muted); }

  .btn-del {
    background: none;
    color: var(--muted);
    border: none;
    font-size: 1rem;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    transition: color 0.15s;
  }

  .btn-del:hover { color: var(--warn); background: var(--warn-dim); }

  /* DASHBOARD */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 14px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
  }

  .stat-label {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }

  .stat-value {
    font-family: var(--mono);
    font-size: 1.6rem;
    font-weight: 700;
    line-height: 1;
  }

  .stat-value.accent { color: var(--accent); }
  .stat-value.warn { color: var(--warn); }
  .stat-value.neutral { color: var(--text); }

  .empty-state {
    text-align: center;
    color: var(--muted);
    padding: 48px 20px;
    font-size: 0.9rem;
  }

  .empty-state .icon { font-size: 2rem; margin-bottom: 10px; }

  .section-title {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 14px;
  }

  .error-msg {
    color: var(--warn);
    font-size: 0.82rem;
    margin-top: 8px;
    display: none;
  }

  @media (max-width: 640px) {
    .form-grid { grid-template-columns: 1fr 1fr; }
    .panel { padding: 16px; }
    .tabs { padding: 0 16px; }
    header { padding: 14px 16px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">FlipIQ</div>
    <div class="logo-sub">Resale Intelligence</div>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('trend')">🔍 Trend Scout</button>
  <button class="tab" onclick="switchTab('inventory')">📦 My Inventory</button>
  <button class="tab" onclick="switchTab('dashboard')">📊 Dashboard</button>
</div>

<!-- TREND SCOUT -->
<div id="panel-trend" class="panel active">
  <div class="search-row">
    <input type="text" id="trend-input" placeholder="e.g. Stanley cup, vintage Levi's, Pokémon cards…" onkeydown="if(event.key==='Enter') analyzeTrend()">
    <button onclick="analyzeTrend()" id="trend-btn">Analyze</button>
  </div>

  <div class="loading" id="trend-loading">
    <div class="spinner"></div>
    Researching market trends…
  </div>

  <div class="trend-result" id="trend-result">
    <div class="trend-header">
      <div class="trend-product-name" id="result-name"></div>
      <div class="trend-score">
        <span class="score-pill" id="result-score"></span>
      </div>
    </div>
    <div class="trend-body" id="result-body"></div>
    <div class="trend-metrics" id="result-metrics"></div>
  </div>
</div>

<!-- INVENTORY -->
<div id="panel-inventory" class="panel">
  <div class="add-form">
    <h3>Log a Purchase</h3>
    <div class="form-grid">
      <div class="form-group">
        <label>Item Name</label>
        <input type="text" id="item-name" placeholder="e.g. Air Jordan 1 Retro">
      </div>
      <div class="form-group">
        <label>Bought For ($)</label>
        <input type="number" id="item-cost" placeholder="0.00" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label>Sold For ($)</label>
        <input type="number" id="item-sale" placeholder="0.00" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="item-status">
          <option value="held">Holding</option>
          <option value="listed">Listed</option>
          <option value="sold">Sold</option>
        </select>
      </div>
      <div class="form-group">
        <label>&nbsp;</label>
        <button onclick="addItem()">Add</button>
      </div>
    </div>
    <div class="error-msg" id="item-error">Please enter an item name and purchase price.</div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Item</th>
          <th>Platform</th>
          <th>Cost</th>
          <th>Sale Price</th>
          <th>Profit</th>
          <th>Margin</th>
          <th>Status</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="inventory-body">
      </tbody>
    </table>
    <div class="empty-state" id="inventory-empty">
      <div class="icon">📦</div>
      No items yet. Log your first purchase above.
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="panel-dashboard" class="panel">
  <div class="stats-grid" id="stats-grid"></div>
  <div class="section-title">All Items</div>
  <div id="dash-list"></div>
</div>

<script>
  let inventory = JSON.parse(localStorage.getItem('flipiq_inventory') || '[]');

  function saveInventory() {
    localStorage.setItem('flipiq_inventory', JSON.stringify(inventory));
  }

  function switchTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('panel-' + name).classList.add('active');
    if (name === 'dashboard') renderDashboard();
    if (name === 'inventory') renderInventory();
  }

  // ── TREND SCOUT ──────────────────────────────────────────────
  async function analyzeTrend() {
    const q = document.getElementById('trend-input').value.trim();
    if (!q) return;

    const btn = document.getElementById('trend-btn');
    const loading = document.getElementById('trend-loading');
    const result = document.getElementById('trend-result');

    btn.disabled = true;
    loading.classList.add('visible');
    result.classList.remove('visible');

    const prompt = `You are a resale market expert specializing in eBay, Amazon, and Mercari trends.
Analyze the resale potential of: "${q}"

Respond ONLY with a JSON object, no markdown, no preamble:
{
  "name": "clean product name",
  "signal": "HOT" | "WARM" | "COLD" | "RISKY",
  "summary": "2-3 sentence analysis of current demand, why people want it, and whether it's a good flip",
  "avgBuyPrice": "estimated price to buy/source (e.g. $20-40)",
  "avgSellPrice": "estimated resale price (e.g. $60-90)",
  "typicalMargin": "typical profit margin % (e.g. 40-60%)",
  "bestPlatform": "eBay | Amazon | Mercari | All",
  "competition": "Low | Medium | High",
  "trend": "Rising | Stable | Fading"
}`;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      const data = await res.json();
      const raw = data.content.map(b => b.text || '').join('');
      const clean = raw.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);
      renderTrendResult(parsed);
    } catch (e) {
      document.getElementById('result-name').textContent = q;
      document.getElementById('result-body').textContent = 'Could not load trend data. Please try again.';
      document.getElementById('result-score').textContent = 'ERROR';
      document.getElementById('result-score').className = 'score-pill score-cold';
      document.getElementById('result-metrics').innerHTML = '';
      result.classList.add('visible');
    }

    btn.disabled = false;
    loading.classList.remove('visible');
  }

  function renderTrendResult(d) {
    document.getElementById('result-name').textContent = d.name;
    document.getElementById('result-body').textContent = d.summary;

    const scoreEl = document.getElementById('result-score');
    scoreEl.textContent = d.signal;
    const cls = { HOT: 'score-hot', WARM: 'score-warm', COLD: 'score-cold', RISKY: 'score-risky' };
    scoreEl.className = 'score-pill ' + (cls[d.signal] || 'score-cold');

    const trendColor = d.trend === 'Rising' ? 'green' : d.trend === 'Fading' ? 'orange' : 'yellow';
    const compColor = d.competition === 'High' ? 'orange' : d.competition === 'Low' ? 'green' : 'yellow';

    document.getElementById('result-metrics').innerHTML = `
      <div class="metric-box"><div class="metric-label">Source Price</div><div class="metric-value">${d.avgBuyPrice}</div></div>
      <div class="metric-box"><div class="metric-label">Resale Price</div><div class="metric-value green">${d.avgSellPrice}</div></div>
      <div class="metric-box"><div class="metric-label">Typical Margin</div><div class="metric-value green">${d.typicalMargin}</div></div>
      <div class="metric-box"><div class="metric-label">Best Platform</div><div class="metric-value">${d.bestPlatform}</div></div>
      <div class="metric-box"><div class="metric-label">Competition</div><div class="metric-value ${compColor}">${d.competition}</div></div>
      <div class="metric-box"><div class="metric-label">Trend</div><div class="metric-value ${trendColor}">${d.trend}</div></div>
    `;

    document.getElementById('trend-result').classList.add('visible');
  }

  // ── INVENTORY ──────────────────────────────────────────────
  function addItem() {
    const name = document.getElementById('item-name').value.trim();
    const cost = parseFloat(document.getElementById('item-cost').value);
    const sale = parseFloat(document.getElementById('item-sale').value) || null;
    const status = document.getElementById('item-status').value;
    const errEl = document.getElementById('item-error');

    if (!name || isNaN(cost)) {
      errEl.style.display = 'block';
      return;
    }
    errEl.style.display = 'none';

    inventory.push({ id: Date.now(), name, cost, sale, status, date: new Date().toLocaleDateString() });
    saveInventory();

    document.getElementById('item-name').value = '';
    document.getElementById('item-cost').value = '';
    document.getElementById('item-sale').value = '';
    document.getElementById('item-status').value = 'held';

    renderInventory();
  }

  function deleteItem(id) {
    inventory = inventory.filter(i => i.id !== id);
    saveInventory();
    renderInventory();
  }

  function renderInventory() {
    const tbody = document.getElementById('inventory-body');
    const empty = document.getElementById('inventory-empty');

    if (inventory.length === 0) {
      tbody.innerHTML = '';
      empty.style.display = 'block';
      return;
    }

    empty.style.display = 'none';
    tbody.innerHTML = inventory.map(item => {
      const profit = item.sale != null ? item.sale - item.cost : null;
      const margin = profit != null && item.cost > 0 ? ((profit / item.cost) * 100).toFixed(0) : null;
      const profitStr = profit != null
        ? `<span class="${profit >= 0 ? 'profit-pos' : 'profit-neg'} td-mono">${profit >= 0 ? '+' : ''}$${profit.toFixed(2)}</span>`
        : `<span class="profit-pend td-mono">—</span>`;
      const marginStr = margin != null
        ? `<span class="${profit >= 0 ? 'profit-pos' : 'profit-neg'} td-mono">${margin}%</span>`
        : `<span class="profit-pend td-mono">—</span>`;
      const saleStr = item.sale != null ? `<span class="td-mono">$${item.sale.toFixed(2)}</span>` : `<span class="profit-pend">—</span>`;
      const statusCls = { sold: 'status-sold', listed: 'status-listed', held: 'status-held' }[item.status];
      const statusLabel = { sold: 'Sold', listed: 'Listed', held: 'Holding' }[item.status];

      return `<tr>
        <td>${item.name}<br><span style="font-size:0.72rem;color:var(--muted)">${item.date}</span></td>
        <td style="color:var(--muted);font-size:0.8rem">eBay/Amazon/Mercari</td>
        <td class="td-mono">$${item.cost.toFixed(2)}</td>
        <td>${saleStr}</td>
        <td>${profitStr}</td>
        <td>${marginStr}</td>
        <td><span class="status-badge ${statusCls}">${statusLabel}</span></td>
        <td><button class="btn-del" onclick="deleteItem(${item.id})">×</button></td>
      </tr>`;
    }).join('');
  }

  // ── DASHBOARD ──────────────────────────────────────────────
  function renderDashboard() {
    const sold = inventory.filter(i => i.status === 'sold' && i.sale != null);
    const totalSpent = inventory.reduce((s, i) => s + i.cost, 0);
    const totalRevenue = sold.reduce((s, i) => s + i.sale, 0);
    const totalProfit = sold.reduce((s, i) => s + (i.sale - i.cost), 0);
    const avgMargin = sold.length
      ? (sold.reduce((s, i) => s + ((i.sale - i.cost) / i.cost) * 100, 0) / sold.length).toFixed(0)
      : 0;

    document.getElementById('stats-grid').innerHTML = `
      <div class="stat-card">
        <div class="stat-label">Total Items</div>
        <div class="stat-value neutral">${inventory.length}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Spent</div>
        <div class="stat-value warn">$${totalSpent.toFixed(0)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Revenue (Sold)</div>
        <div class="stat-value neutral">$${totalRevenue.toFixed(0)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Net Profit</div>
        <div class="stat-value ${totalProfit >= 0 ? 'accent' : 'warn'}">$${totalProfit.toFixed(0)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Avg Margin</div>
        <div class="stat-value ${avgMargin >= 0 ? 'accent' : 'warn'}">${avgMargin}%</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Items Sold</div>
        <div class="stat-value neutral">${sold.length}</div>
      </div>
    `;

    const list = document.getElementById('dash-list');
    if (inventory.length === 0) {
      list.innerHTML = '<div class="empty-state"><div class="icon">📊</div>Add items in the Inventory tab to see your stats here.</div>';
      return;
    }

    list.innerHTML = `<div class="table-wrap"><table>
      <thead><tr><th>Item</th><th>Cost</th><th>Sale</th><th>Profit</th><th>Status</th></tr></thead>
      <tbody>${inventory.map(item => {
        const profit = item.sale != null ? item.sale - item.cost : null;
        const profitStr = profit != null
          ? `<span class="${profit >= 0 ? 'profit-pos' : 'profit-neg'} td-mono">${profit >= 0 ? '+' : ''}$${profit.toFixed(2)}</span>`
          : `<span class="profit-pend">—</span>`;
        const statusCls = { sold: 'status-sold', listed: 'status-listed', held: 'status-held' }[item.status];
        const statusLabel = { sold: 'Sold', listed: 'Listed', held: 'Holding' }[item.status];
        return `<tr>
          <td>${item.name}</td>
          <td class="td-mono">$${item.cost.toFixed(2)}</td>
          <td class="td-mono">${item.sale != null ? '$' + item.sale.toFixed(2) : '—'}</td>
          <td>${profitStr}</td>
          <td><span class="status-badge ${statusCls}">${statusLabel}</span></td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>`;
  }

  // init
  renderInventory();
</script>
</body>
</html>
